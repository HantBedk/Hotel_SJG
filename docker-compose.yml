services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        VITE_REVERB_HOST: ${VITE_REVERB_HOST:-}
        VITE_REVERB_PORT: ${VITE_REVERB_PORT:-0}
        VITE_REVERB_SCHEME: ${VITE_REVERB_SCHEME:-}
        VITE_REVERB_APP_KEY: ${REVERB_APP_KEY:-hotel_reverb_key}
    container_name: hotel_app
    restart: unless-stopped
    ports:
      - "${HTTP_BIND:-0.0.0.0}:${HTTP_PORT:-80}:80"
    volumes:
      - ./backend/app:/var/www/html/app
      - ./backend/routes:/var/www/html/routes
      - ./backend/config:/var/www/html/config
      - ./backend/database:/var/www/html/database
      - ./backend/resources:/var/www/html/resources
      - ./backend/storage:/var/www/html/storage
      # bootstrap/cache NO se monta: evita packages.php del host (dev) vs vendor --no-dev
      # Carpeta del PC donde se guardan los backups automáticos.
      # Configurable vía BACKUP_HOST_PATH en .env. Si no se define, usa ./backup
      # dentro del proyecto. Funciona en Windows (D:\…), Linux (/mnt/…), etc.
      - ${BACKUP_HOST_PATH:-./backup}:/var/www/html/backup
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_URL=${APP_URL:-http://localhost}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-hotel_sjg}
      - DB_USERNAME=${DB_USERNAME:-hotel_user}
      - DB_PASSWORD=${DB_PASSWORD:-changeme_strong_password}
      - REVERB_APP_ID=${REVERB_APP_ID:-hotel_sjg}
      - REVERB_APP_KEY=${REVERB_APP_KEY:-hotel_reverb_key}
      - REVERB_APP_SECRET=${REVERB_APP_SECRET:-changeme_reverb_secret}
      - REVERB_HOST=reverb
      - REVERB_PORT=8080
      - REVERB_UPSTREAM=${REVERB_UPSTREAM:-reverb:8080}
      # Sanctum SPA cookies — incluir puerto del dev server para que coincida con Origin
      - SANCTUM_STATEFUL_DOMAINS=${SANCTUM_STATEFUL_DOMAINS:-localhost,127.0.0.1,localhost:3007,127.0.0.1:3007}
      - FRONTEND_ORIGINS=${FRONTEND_ORIGINS:-http://localhost,http://localhost:3007,http://127.0.0.1,http://127.0.0.1:3007}
      - SESSION_SAME_SITE=${SESSION_SAME_SITE:-lax}
      - SESSION_SECURE_COOKIE=${SESSION_SECURE_COOKIE:-false}
      # Ruta del PC donde Docker monta /var/www/html/backup. Se expone a Laravel
      # para que la UI muestre al usuario en qué carpeta de su computador aparecerán los .zip.
      - BACKUP_HOST_PATH=${BACKUP_HOST_PATH:-./backup}
    depends_on:
      db:
        condition: service_healthy
      reverb:
        condition: service_started
    networks:
      - hotel-network

  db:
    image: postgres:16-alpine
    container_name: hotel_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-hotel_sjg}
      POSTGRES_USER: ${DB_USERNAME:-hotel_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_strong_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-hotel_user} -d ${DB_DATABASE:-hotel_sjg}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hotel-network

  reverb:
    build:
      context: .
      dockerfile: docker/Dockerfile.reverb
    container_name: hotel_reverb
    restart: unless-stopped
    ports:
      - "${REVERB_BIND:-0.0.0.0}:${REVERB_HOST_PORT:-8080}:8080"
    environment:
      - REVERB_APP_ID=${REVERB_APP_ID:-hotel_sjg}
      - REVERB_APP_KEY=${REVERB_APP_KEY:-hotel_reverb_key}
      - REVERB_APP_SECRET=${REVERB_APP_SECRET:-changeme_reverb_secret}
      - REVERB_HOST=0.0.0.0
      - REVERB_PORT=8080
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-hotel_sjg}
      - DB_USERNAME=${DB_USERNAME:-hotel_user}
      - DB_PASSWORD=${DB_PASSWORD:-changeme_strong_password}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hotel-network

volumes:
  postgres_data:

networks:
  hotel-network:
    driver: bridge
