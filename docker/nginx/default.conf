server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.html index.php;

    client_max_body_size 50M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/x-javascript application/font-woff application/font-woff2 image/svg+xml;

    # API + Sanctum + Broadcasting → PHP-FPM
    location /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /sanctum {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /broadcasting {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param HTTP_AUTHORIZATION $http_authorization;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    # Storage files (PDFs, logos)
    location /storage {
        try_files $uri $uri/ =404;
    }

    # React SPA → siempre servir index.html para rutas del frontend
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Caché de assets estáticos del build de React
    location /app/assets {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~ /\.ht {
        deny all;
    }
}
