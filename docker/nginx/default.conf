server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.html index.php;

    client_max_body_size 50M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/x-javascript application/font-woff application/font-woff2 image/svg+xml;

    # API + Sanctum + Broadcasting → PHP-FPM
    location /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /sanctum {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /broadcasting {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param HTTP_AUTHORIZATION $http_authorization;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    # Storage files (PDFs, logos)
    location /storage {
        try_files $uri $uri/ =404;
    }

    # WebSocket — Laravel Reverb (protocolo Pusher en /app/*).
    # __REVERB_UPSTREAM__ se sustituye en entrypoint:
    #   compose multi-contenedor → reverb:8080
    #   all-in-one               → 127.0.0.1:8080
    location /app {
        proxy_pass http://__REVERB_UPSTREAM__;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # React SPA → siempre servir index.html para rutas del frontend
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html nunca se cachea: los nombres de los chunks cambian en cada
    # build, así que si el navegador se queda con un index.html viejo pedirá
    # JS con hashes que ya no existen y todas las rutas fallarán.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Caché de assets estáticos del build de React (con hash en el nombre)
    location /app/assets {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~ /\.ht {
        deny all;
    }
}
