# nginx del HOST — hotel.dataguaviare.com.co
# Instalar:
#   sudo cp docker/vps-hotel.dataguaviare.com.co.conf /etc/nginx/sites-available/hotel.dataguaviare.com.co
#   sudo ln -sf /etc/nginx/sites-available/hotel.dataguaviare.com.co /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d hotel.dataguaviare.com.co
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name hotel.dataguaviare.com.co;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name hotel.dataguaviare.com.co;

    ssl_certificate     /etc/letsencrypt/live/hotel.dataguaviare.com.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hotel.dataguaviare.com.co/privkey.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:9084;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /app {
        proxy_pass http://127.0.0.1:9084;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
